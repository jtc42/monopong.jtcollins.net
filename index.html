<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="X-UA-Compatible" content="ie=edge">
    <meta name="apple-itunes-app" content="app-id=1660590652">
    <title>Monopong</title>
    <link rel="icon" type="image/x-icon" href="/assets/icons/favicon.ico">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/css/styles.css">
</head>

<body data-mode="ios">
    <script src="/js/index.js"></script>

    <!-- LCD scanline overlay (visible in GBC mode) -->
    <div id="lcd-overlay"></div>

    <div class="page">
        <!-- Mode toggle -->
        <div class="toggle-bar">
            <div class="mode-toggle" onclick="toggleMode()">
                <span class="mode-toggle-option active" id="opt-ios">iOS</span>
                <span class="mode-toggle-option" id="opt-gbc">GBC</span>
            </div>
        </div>

        <div class="main-grid">
            <div class="info-panel">
                <p class="title">monopong</p>
                <p>A lonely ball game</p>
                <div class="download-section">
                    <!-- iOS App Store download -->
                    <div id="ios-download">
                        <a href="https://apps.apple.com/us/app/monopong/id1660590652?itsct=apps_box_badge&amp;itscg=30200"
                            class="appstore-badge"><img
                                src="https://tools.applemediaservices.com/api/badges/download-on-the-app-store/black/en-us?size=250x83&amp;releaseDate=1671667200?h=326b4d64bc3611e66af7722aa1329859"
                                alt="Download on the App Store"></a>
                    </div>
                    <!-- GBC ROM download -->
                    <div id="gbc-download">
                        <a href="/gbcdl/1.2/monopong.gbc" class="gbc-download-btn" download>Download ROM</a>
                        <div class="gbc-btn-spacer">
                            <a href="#" class="gbc-play-btn" onclick="showEmulator(); return false;">Play Online</a>
                        </div>
                        <div class="gbc-btn-spacer" id="gbc-back" style="display: none;">
                            <a href="#" class="gbc-play-btn" onclick="hideEmulator(); return false;">Back</a>
                        </div>
                    </div>
                </div>
            </div>

            <div class="ring-area">
                <!-- iOS mode: original ring + ball -->
                <div id="ring-ios">
                    <img src="/assets/images/balls.svg" alt="balls" class="ball-img" />
                </div>
                <!-- GBC mode: pixel ring + ball (scaled up with nearest-neighbor) -->
                <div id="ring-gbc">
                    <img src="/assets/images/ring-pixel.png" alt="ring" class="ring-img" />
                    <img src="/assets/images/balls-pixel.png" alt="balls" class="ball-img" />
                </div>
                <!-- GBC emulator (shown when Play Online is clicked) -->
                <div id="emulator-container">
                    <div id="emulator-border">
                        <iframe id="emulator-frame" src="about:blank" allowfullscreen></iframe>
                    </div>
                </div>
            </div>

            <div></div>
        </div>

        <div class="footer">
            <p class="footer-link">
                <a href="/privacy">Privacy Policy</a>
            </p>
            <p class="footer-link">
                <a href="https://github.com/jtc42/monopong-ios-issues/issues" target="_blank">Report a Bug</a>
            </p>
        </div>
    </div>
</body>

</html>
